services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_auth
    env_file:
      - ./.env.db
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "log_statement=all"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
volumes:
  postgres_data:
